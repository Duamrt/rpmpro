<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPM Pro — Painel da Oficina</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --card-bg: #161616;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --text-muted: #888;
      --amber: #D97706;
    }

    body {
      font-family: 'Barlow Condensed', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      cursor: none;
    }

    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap');

    /* Header */
    .tv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      border-bottom: 2px solid var(--amber);
      background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
    }
    .tv-header h1 {
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .tv-header h1 span { color: var(--amber); }
    .tv-header .tv-clock {
      font-size: 32px;
      font-weight: 700;
      color: var(--amber);
      font-variant-numeric: tabular-nums;
    }
    .tv-header .tv-info {
      font-size: 14px;
      color: var(--text-muted);
      text-align: right;
    }

    /* Colunas */
    .tv-board {
      display: flex;
      gap: 0;
      height: calc(100vh - 80px);
      overflow: hidden;
    }
    .tv-col {
      flex: 1;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .tv-col:last-child { border-right: none; }
    .tv-col-header {
      padding: 14px 12px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: #111;
    }
    .tv-col-header .tv-col-icon { font-size: 22px; }
    .tv-col-header .tv-col-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .tv-col-header .tv-col-count {
      display: inline-block;
      background: var(--amber);
      color: #000;
      font-weight: 800;
      font-size: 13px;
      width: 24px; height: 24px;
      line-height: 24px;
      border-radius: 50%;
      margin-left: 6px;
    }
    .tv-col-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tv-col-body::-webkit-scrollbar { width: 0; }

    /* Cards */
    .tv-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease;
    }
    .tv-card.tv-card-new {
      animation: pulseNew 1.5s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseNew {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 20px rgba(217, 119, 6, 0.4); }
    }
    .tv-card-placa {
      font-size: 22px;
      font-weight: 800;
      color: var(--amber);
      letter-spacing: 1px;
    }
    .tv-card-veiculo {
      font-size: 14px;
      color: var(--text);
      margin-top: 2px;
    }
    .tv-card-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .tv-card-tempo {
      font-weight: 600;
    }
    .tv-card-tempo.alerta { color: #eab308; }
    .tv-card-tempo.critico { color: #ef4444; }

    /* Empty */
    .tv-empty {
      text-align: center;
      color: #333;
      font-size: 14px;
      padding: 20px;
      font-style: italic;
    }

    /* Status bar */
    .tv-statusbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 6px 32px;
      background: #111;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .tv-statusbar .tv-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #16a34a;
      margin-right: 6px;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Loading */
    .tv-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 24px;
      color: var(--amber);
      flex-direction: column;
      gap: 16px;
    }
    .tv-loading .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Erro */
    .tv-erro {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 20px;
      color: #ef4444;
      flex-direction: column;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div id="tv-app">
    <div class="tv-loading" id="tv-loading">
      <div class="spinner"></div>
      <div>Conectando ao painel...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // RPM Pro — Painel TV (sem login, token por oficina)
    const TV = {
      db: null,
      oficinaId: null,
      oficinaNome: '',
      _interval: null,
      _realtimeSub: null,

      colunas: [
        { status: 'entrada', label: 'Aguardando Avaliação', icon: '🔍' },
        { status: 'diagnostico', label: 'Em Diagnóstico', icon: '🔧' },
        { status: 'orcamento', label: 'Orçamento', icon: '📋' },
        { status: 'aguardando_peca', label: 'Aguard. Peça', icon: '📦' },
        { status: 'execucao', label: 'Em Execução', icon: '⚙️' },
        { status: 'pronto', label: 'Pronto p/ Retirar', icon: '✅' },
      ],

      async init() {
        // Pega token da URL
        const params = new URLSearchParams(location.search);
        const token = params.get('t');
        if (!token) { this._erro('Link inválido. Gere o link na configuração da oficina.'); return; }

        // Conecta Supabase
        const SUPABASE_URL = 'https://roeeyypssutzfzzkypsq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvZWV5eXBzc3V0emZ6emt5cHNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTk0MTgsImV4cCI6MjA5MDM5NTQxOH0.9oCOmABUTXox3FaRViD2zcUaqv94VfOJFMQYz_fcJi4';
        this.db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Busca oficina pelo token
        const { data: oficina, error } = await this.db.from('oficinas')
          .select('id, nome, logo_url')
          .eq('tv_token', token)
          .maybeSingle();

        if (!oficina) { this._erro('Token inválido ou oficina não encontrada.'); return; }

        this.oficinaId = oficina.id;
        this.oficinaNome = oficina.nome;
        this._logoUrl = oficina.logo_url || '';

        // Carrega e inicia refresh
        await this.carregar();
        this._interval = setInterval(() => this.carregar(), 30000);
        this._iniciarRelogio();
        this._iniciarRealtime();
      },

      async carregar() {
        const { data: lista, error } = await this.db.from('ordens_servico')
          .select('id, status, created_at, veiculos(placa, marca, modelo, cor), clientes(nome), profiles!ordens_servico_mecanico_id_fkey(nome)')
          .eq('oficina_id', this.oficinaId)
          .not('status', 'in', '("entregue","cancelada")')
          .order('created_at', { ascending: true });

        if (error) { console.error(error); return; }
        this._render(lista || []);
      },

      _render(lista) {
        const grupos = {};
        this.colunas.forEach(c => grupos[c.status] = []);
        lista.forEach(os => { if (grupos[os.status]) grupos[os.status].push(os); });

        const totalAtivos = lista.length;

        const app = document.getElementById('tv-app');
        app.innerHTML = `
          <div class="tv-header">
            <div style="display:flex;align-items:center;gap:16px;">
              ${this._logoUrl ? `<img src="${this._logoUrl}" style="height:40px;border-radius:6px;">` : ''}
              <h1><span>⚙</span> ${this._esc(this.oficinaNome)}</h1>
            </div>
            <div style="text-align:right;">
              <div class="tv-clock" id="tv-clock">${this._hora()}</div>
              <div class="tv-info">${totalAtivos} veículo${totalAtivos !== 1 ? 's' : ''} no pátio</div>
            </div>
          </div>
          <div class="tv-board">
            ${this.colunas.map(col => {
              const cards = grupos[col.status] || [];
              return `
                <div class="tv-col">
                  <div class="tv-col-header">
                    <span class="tv-col-icon">${col.icon}</span>
                    <div class="tv-col-label">
                      ${col.label}
                      ${cards.length > 0 ? `<span class="tv-col-count">${cards.length}</span>` : ''}
                    </div>
                  </div>
                  <div class="tv-col-body">
                    ${cards.length ? cards.map(os => this._card(os)).join('') : '<div class="tv-empty">—</div>'}
                  </div>
                </div>`;
            }).join('')}
          </div>
          <div class="tv-statusbar">
            <div><span class="tv-dot"></span>Atualização automática a cada 30s</div>
            <div>RPM Pro · Painel da Oficina</div>
          </div>
        `;
      },

      _card(os) {
        const placa = os.veiculos?.placa || '-';
        const veiculo = [os.veiculos?.marca, os.veiculos?.modelo].filter(Boolean).join(' ');
        const cor = os.veiculos?.cor || '';
        const mecanico = os.profiles?.nome || '';
        const cliente = os.clientes?.nome || '';

        // Tempo no status
        const horas = Math.floor((Date.now() - new Date(os.created_at).getTime()) / 3600000);
        let tempoClass = '';
        let tempoTexto = '';
        if (horas < 1) { tempoTexto = 'Agora'; }
        else if (horas < 24) { tempoTexto = horas + 'h'; }
        else { tempoTexto = Math.floor(horas / 24) + 'd'; }
        if (horas >= 72) tempoClass = 'critico';
        else if (horas >= 24) tempoClass = 'alerta';

        return `
          <div class="tv-card">
            <div class="tv-card-placa">${this._esc(placa)}</div>
            <div class="tv-card-veiculo">${this._esc(veiculo)}${cor ? ' · ' + this._esc(cor) : ''}</div>
            <div class="tv-card-info">
              <span>${mecanico ? '🔧 ' + this._esc(mecanico) : ''}</span>
              <span class="tv-card-tempo ${tempoClass}">${tempoTexto}</span>
            </div>
          </div>`;
      },

      _iniciarRealtime() {
        this._realtimeSub = this.db.channel('tv-os')
          .on('postgres_changes', {
            event: '*',
            schema: 'public',
            table: 'ordens_servico',
            filter: `oficina_id=eq.${this.oficinaId}`
          }, () => { this.carregar(); })
          .subscribe();
      },

      _iniciarRelogio() {
        setInterval(() => {
          const el = document.getElementById('tv-clock');
          if (el) el.textContent = this._hora();
        }, 1000);
      },

      _hora() {
        return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      },

      _esc(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      },

      _erro(msg) {
        document.getElementById('tv-app').innerHTML = `
          <div class="tv-erro">
            <div style="font-size:48px;">⚠️</div>
            <div>${msg}</div>
            <div style="font-size:14px;color:#888;margin-top:12px;">Entre em contato com o suporte.</div>
          </div>`;
      }
    };

    TV.init();
  </script>
</body>
</html>
